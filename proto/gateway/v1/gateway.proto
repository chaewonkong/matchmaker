syntax = "proto3";
package gateway.v1;
option go_package = "github.com/chaewonkong/matchmaker/gen/go/gateway/v1";

service GatewayService {
  // Unary RPCs
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc CancelTicket(CancelTicketRequest) returns (CancelTicketResponse);
  rpc AcknowledgeMatch(AcknowledgeMatchRequest) returns (AcknowledgeMatchResponse);
  rpc SubmitMatchResult(SubmitMatchResultRequest) returns (SubmitMatchResultResponse);

  // Server-side streaming
  rpc WatchMatchCandidates(WatchMatchCandidatesRequest)
      returns (stream WatchMatchCandidatesResponse);
}

message CreateTicketRequest {
    repeated Player players = 1;
}

message CreateTicketResponse {
    string ticket_id = 1;
    double estimated_wait_time_sec = 2;
}

message CancelTicketRequest {
    string ticket_id = 1;
}

message CancelTicketResponse {
    string ticket_id = 1;
    // success / fail
}

message AcknowledgeMatchRequest {
    string match_id = 1;
}

message AcknowledgeMatchResponse {
    string match_id = 1;
}

message SubmitMatchResultRequest {
    Match match = 1;
}

message SubmitMatchResultResponse {
    string match_id = 1;
}

message WatchMatchCandidatesRequest {
  string ticket_id = 1;
}

message WatchMatchCandidatesResponse {
  oneof event {
    Match match = 1;  // 매치 후보 발견
    MatchExpired expired = 2;      // 타임아웃/만료
  }
}

message Match {
  string match_id = 1;
  repeated Team teams = 2;
  // 게임서버 접속 정보 등
}

message MatchExpired {
  string reason = 1;
}

message Team {
    string team_id = 1;
    repeated Ticket tickets = 2;
}

message Ticket {
    string ticket_id = 1;
    repeated Player players = 2;
}

message Player {
    string player_id = 1;
}